service: ai-merchandise-backend-python

provider:
  name: aws
  runtime: python3.11
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    AWS_REGION: ${self:provider.region}
    S3_BUCKET_ANONYMOUS: ${env:S3_BUCKET_ANONYMOUS}
    S3_BUCKET_USER: ${env:S3_BUCKET_USER}
    API_KEY: ${env:API_KEY}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - bedrock:InvokeModel
        - bedrock:InvokeModelWithResponseStream
      Resource: "*"
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
        - s3:GeneratePresignedUrl
      Resource: 
        - "arn:aws:s3:::${env:S3_BUCKET_ANONYMOUS}/*"
        - "arn:aws:s3:::${env:S3_BUCKET_USER}/*"

functions:
  generateDesign:
    handler: src/generate_design.handler
    timeout: 300
    events:
      - http:
          path: /generate-design
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: non-linux